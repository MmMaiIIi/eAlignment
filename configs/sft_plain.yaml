stage: sft
do_train: true
model_name_or_path: Qwen/Qwen3-8B
template: qwen
finetuning_type: full

dataset: ecom_sft_seed
dataset_dir: data/processed
cutoff_len: 1024

learning_rate: 5.0e-6
num_train_epochs: 1.0
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
lr_scheduler_type: constant
warmup_ratio: 0.0
optim: adamw_torch
seed: 42

logging_steps: 10
save_steps: 200
report_to: tensorboard
logging_dir: outputs/sft/qwen3_8b_full/tensorboard
plot_loss: true
output_dir: outputs/sft/qwen3_8b_full
