# Stage 2 smoke SFT config for LLaMA-Factory.
# Intended for quick no-crash validation, not quality training.
stage: sft
do_train: true
model_name_or_path: Qwen/Qwen3-8B
template: qwen
finetuning_type: lora

dataset: ecom_sft_seed
dataset_dir: data/processed
cutoff_len: 1024
max_samples: 16

learning_rate: 1.0e-4
num_train_epochs: 1.0
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
lr_scheduler_type: cosine
warmup_ratio: 0.03

logging_steps: 1
save_steps: 20
plot_loss: true
output_dir: outputs/sft/smoke
