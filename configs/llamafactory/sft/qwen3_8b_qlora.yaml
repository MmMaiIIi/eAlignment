# Stage 2 QLoRA SFT config for Qwen3-8B via LLaMA-Factory.
stage: sft
do_train: true
model_name_or_path: Qwen/Qwen3-8B
template: qwen
finetuning_type: lora

dataset: ecom_sft_seed
dataset_dir: data/processed
cutoff_len: 2048

quantization_bit: 4
double_quantization: true
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

learning_rate: 1.5e-4
num_train_epochs: 3.0
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
lr_scheduler_type: cosine
warmup_ratio: 0.03

logging_steps: 10
save_steps: 200
plot_loss: true
output_dir: outputs/sft/qwen3_8b_qlora
deepspeed: configs/llamafactory/deepspeed/zero2.json
