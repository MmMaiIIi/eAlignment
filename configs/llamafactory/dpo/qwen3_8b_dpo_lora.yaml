# Stage 4 default DPO LoRA config for Qwen3-8B via LLaMA-Factory.
stage: dpo
do_train: true
model_name_or_path: Qwen/Qwen3-8B
template: qwen
finetuning_type: lora

dataset: ecom_pref_seed
dataset_dir: data/processed
cutoff_len: 2048

pref_beta: 0.1
learning_rate: 5.0e-5
num_train_epochs: 2.0
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
lr_scheduler_type: cosine
warmup_ratio: 0.03

lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: all

logging_steps: 10
save_steps: 200
plot_loss: true
output_dir: outputs/dpo/qwen3_8b_dpo_lora
deepspeed: configs/llamafactory/deepspeed/zero2.json
