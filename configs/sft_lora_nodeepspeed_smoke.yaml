stage: sft
do_train: true
model_name_or_path: Qwen/Qwen3-8B
template: qwen
finetuning_type: lora

dataset: ecom_sft_seed
dataset_dir: data/processed
cutoff_len: 1024
max_samples: 16

lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: all

learning_rate: 5.0e-5
num_train_epochs: 1.0
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
lr_scheduler_type: cosine
warmup_ratio: 0.0
optim: adamw_torch
fp16: true
seed: 42

logging_steps: 1
save_steps: 20
report_to: tensorboard
logging_dir: outputs/sft/lora_nodeepspeed_smoke/tensorboard
plot_loss: true
output_dir: outputs/sft/lora_nodeepspeed_smoke
