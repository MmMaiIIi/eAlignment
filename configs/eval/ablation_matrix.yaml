name: stage5_ablation_matrix
owner: project_repo
notes: >
  This plan defines reproducible experiment comparisons.
  It does not execute training automatically; it generates command plans.

experiments:
  - id: base_vs_sft
    title: Base vs SFT (LoRA)
    objective: Measure alignment gain from supervised fine-tuning.
    train:
      stage: sft
      config: configs/llamafactory/sft/qwen3_8b_lora.yaml
    eval:
      config: configs/eval/comparison_eval.yaml
      base_predictions: data/synthetic/eval_base_predictions.jsonl
      sft_predictions: data/synthetic/eval_sft_predictions.jsonl

  - id: sft_vs_sft_dpo
    title: SFT vs SFT+DPO
    objective: Measure additional preference alignment gain after DPO.
    train:
      stage: dpo
      config: configs/llamafactory/dpo/qwen3_8b_dpo_lora.yaml
    eval:
      config: configs/eval/comparison_eval.yaml
      base_predictions: data/synthetic/eval_sft_predictions.jsonl
      sft_predictions: data/synthetic/eval_sft_predictions.jsonl

  - id: lora_vs_qlora
    title: LoRA vs QLoRA
    objective: Compare quality-efficiency tradeoff between LoRA and QLoRA.
    train:
      stage: sft
      config: configs/llamafactory/sft/qwen3_8b_qlora.yaml
    eval:
      config: configs/eval/comparison_eval.yaml
      base_predictions: data/synthetic/eval_base_predictions.jsonl
      sft_predictions: data/synthetic/eval_sft_predictions.jsonl

  - id: dpo_beta_comparison
    title: DPO beta sensitivity
    objective: Compare preference sharpness at different beta values.
    train:
      stage: dpo
      config: configs/llamafactory/dpo/qwen3_8b_dpo_lora.yaml
    notes: Adjust pref_beta and rerun with consistent seeds.

  - id: preference_quality_sensitivity
    title: Preference-data quality sensitivity
    objective: Measure impact of strict vs relaxed filtering on DPO outcomes.
    train:
      stage: dpo
      config: configs/llamafactory/dpo/qwen3_8b_dpo_lora.yaml
    notes: Compare runs with and without invalid/duplicate filtering.
